<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Aguila mascot">
  <title>Aguila - Asistente CreaTuEmpresaUSA</title>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#0A2540"/>
  <!-- Body -->
  <ellipse cx="60" cy="72" rx="22" ry="26" fill="#1a4a7a"/>
  <!-- Chest / lighter body -->
  <ellipse cx="60" cy="76" rx="14" ry="19" fill="#e8f0fa"/>
  <!-- Left wing -->
  <path d="M38 65 Q12 50 8 28 Q22 42 40 58 Z" fill="#0A2540"/>
  <path d="M38 65 Q15 55 12 35 Q25 48 40 60 Z" fill="#1a4a7a"/>
  <!-- Right wing -->
  <path d="M82 65 Q108 50 112 28 Q98 42 80 58 Z" fill="#0A2540"/>
  <path d="M82 65 Q105 55 108 35 Q95 48 80 60 Z" fill="#1a4a7a"/>
