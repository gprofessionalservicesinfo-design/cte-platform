  <path d="M48 94 Q44 100 42 104 M48 94 Q48 102 46 106 M48 94 Q52 101 51 106" stroke="#0A2540" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M72 94 Q76 100 78 104 M72 94 Q72 102 74 106 M72 94 Q68 101 69 106" stroke="#0A2540" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- USA flag badge on chest -->
  <rect x="50" y="70" width="20" height="13" rx="2" fill="#3C3B6E"/>
  <rect x="50" y="73" width="20" height="2" fill="#B22234"/>
  <rect x="50" y="77" width="20" height="2" fill="#B22234"/>
  <rect x="50" y="81" width="20" height="2" fill="#B22234"/>
  <rect x="50" y="70" width="8"  height="7"  fill="#3C3B6E"/>
  <circle cx="52" cy="72" r="0.8" fill="white"/>
  <circle cx="55" cy="72" r="0.8" fill="white"/>
  <circle cx="58" cy="72" r="0.8" fill="white"/>
  <circle cx="52" cy="75" r="0.8" fill="white"/>
  <circle cx="55" cy="75" r="0.8" fill="white"/>
