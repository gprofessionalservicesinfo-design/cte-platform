  <circle cx="60" cy="42" r="20" fill="#1a4a7a"/>
  <!-- White head feathers -->
  <ellipse cx="60" cy="38" rx="16" ry="13" fill="white"/>
  <!-- Eyes -->
  <circle cx="53" cy="40" r="5" fill="#0A2540"/>
  <circle cx="67" cy="40" r="5" fill="#0A2540"/>
  <circle cx="54" cy="39" r="2" fill="white"/>
  <circle cx="68" cy="39" r="2" fill="white"/>
  <circle cx="54.5" cy="39.5" r="1" fill="#0A2540"/>
  <circle cx="68.5" cy="39.5" r="1" fill="#0A2540"/>
  <!-- Beak -->
  <path d="M57 46 Q60 52 63 46 Q60 49 57 46 Z" fill="#DC2626"/>
  <line x1="57" y1="46" x2="63" y2="46" stroke="#B22234" stroke-width="1"/>
